<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; flex-direction: column; gap: 20px; padding: 20px; background: #333; }

/* OG Image - 1200x630 */
.og-image {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #0a1628 0%, #0d1d33 50%, #0f2240 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.og-image::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(100,150,200,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,150,200,0.1) 1px, transparent 1px);
  background-size: 40px 40px;
}
.og-title {
  position: relative;
  z-index: 2;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 56px;
  font-weight: bold;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  margin-bottom: 40px;
}
.og-globe {
  position: relative;
  z-index: 2;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(100,180,255,0.3), transparent 70%);
  border: 2px solid rgba(100,180,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}
.og-globe::before {
  content: '';
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 1px solid rgba(100,180,255,0.3);
}
.og-globe-inner {
  position: absolute;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 30%, #4a9eff 3px, transparent 3px),
    radial-gradient(circle at 80% 20%, #4a9eff 4px, transparent 4px),
    radial-gradient(circle at 70% 70%, #4a9eff 3px, transparent 3px),
    radial-gradient(circle at 30% 80%, #4a9eff 5px, transparent 5px),
    radial-gradient(circle at 50% 50%, #ffd700 8px, transparent 8px);
}
.og-cases {
  position: relative;
  z-index: 2;
  color: #ffd700;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 42px;
  font-weight: bold;
  margin-top: 40px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* Hero BG - 1920x1080 */
.hero-bg {
  width: 1920px;
  height: 1080px;
  background: linear-gradient(135deg, #0a1628 0%, #1a1a3e 50%, #2d1b4e 100%);
  position: relative;
  overflow: hidden;
}
.hero-bg::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(100,180,255,0.4) 1px, transparent 1px),
    radial-gradient(circle at 20% 40%, rgba(100,180,255,0.3) 1.5px, transparent 1.5px),
    radial-gradient(circle at 15% 60%, rgba(100,180,255,0.35) 1px, transparent 1px),
    radial-gradient(circle at 25% 80%, rgba(100,180,255,0.4) 2px, transparent 2px),
    radial-gradient(circle at 5% 90%, rgba(100,180,255,0.3) 1px, transparent 1px);
  background-size: 100% 100%;
}
.hero-nodes {
  position: absolute;
  left: 50px;
  bottom: 100px;
  width: 500px;
  height: 400px;
}
.hero-node {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(100,180,255,0.6);
  box-shadow: 0 0 10px rgba(100,180,255,0.5);
}
.hero-node::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(150,200,255,0.9);
}
.hero-line {
  position: absolute;
  height: 1px;
  background: rgba(100,180,255,0.3);
  transform-origin: left center;
}

/* Logo - 512x512 */
.logo-container {
  width: 512px;
  height: 512px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-circle {
  width: 430px;
  height: 430px;
  border-radius: 50%;
  background: #0a1628;
  border: 4px solid #ffd700;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.logo-circle::before {
  content: '';
  position: absolute;
  width: 414px;
  height: 414px;
  border-radius: 50%;
  border: 2px solid #ffd700;
}
.logo-shield {
  width: 180px;
  height: 220px;
  background: linear-gradient(135deg, #ffd700 0%, #ffed4a 50%, #d4af37 100%);
  clip-path: polygon(50% 0%, 100% 10%, 100% 65%, 50% 100%, 0% 65%, 0% 10%);
  position: relative;
}
.logo-shield::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 70%;
  background: #0a1628;
}
</style>
</head>
<body>

<!-- OG Image -->
<div class="og-image" id="og-image">
  <div class="og-title">USDTRecovery 虚拟币追回服务</div>
  <div class="og-globe">
    <div class="og-globe-inner"></div>
  </div>
  <div class="og-cases">357+成功案例</div>
</div>

<!-- Hero Background -->
<div class="hero-bg" id="hero-bg">
  <div class="hero-nodes">
    <div class="hero-node" style="left: 0px; top: 200px;"></div>
    <div class="hero-node" style="left: 80px; top: 150px;"></div>
    <div class="hero-node" style="left: 150px; top: 100px;"></div>
    <div class="hero-node" style="left: 200px; top: 180px;"></div>
    <div class="hero-node" style="left: 280px; top: 120px;"></div>
    <div class="hero-node" style="left: 320px; top: 220px;"></div>
    <div class="hero-node" style="left: 120px; top: 280px;"></div>
    <div class="hero-node" style="left: 250px; top: 300px;"></div>
    <div class="hero-line" style="left: 6px; top: 206px; width: 80px; transform: rotate(-32deg);"></div>
    <div class="hero-line" style="left: 86px; top: 156px; width: 75px; transform: rotate(-34deg);"></div>
    <div class="hero-line" style="left: 156px; top: 106px; width: 55px; transform: rotate(55deg);"></div>
    <div class="hero-line" style="left: 206px; top: 186px; width: 85px; transform: rotate(-38deg);"></div>
    <div class="hero-line" style="left: 286px; top: 126px; width: 45px; transform: rotate(65deg);"></div>
    <div class="hero-line" style="left: 326px; top: 226px; width: 0px;"></div>
  </div>
</div>

<!-- Logo -->
<div class="logo-container" id="logo">
  <div class="logo-circle">
    <div class="logo-shield"></div>
  </div>
</div>

</body>
</html>
